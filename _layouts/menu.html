---
layout: default
---

<div class="md:w-[50vw] pl-10 max-w-4xl pr-8 space-y-6 font-myriad mb-6">
    {{content}}

    {% assign sorted_menu = site.menu | sort: "order" %}

    <div class="space-y-8">
        {% for item in sorted_menu %}
            <div class="border-b border-gray-700 pb-6 last:border-b-0">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <h3 class="text-3xl text-red-500 font-bold">{{ item.title }}</h3>
                        <div class="text-xl text-gray-300 mt-2">
                            {{ item.content | markdownify }}
                        </div>
                    </div>
                    <div class="ml-6">
                        <span class="text-3xl text-white font-bold">${{ item.price }}</span>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
