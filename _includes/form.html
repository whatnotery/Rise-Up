<form
    id="form"
    action="https://api.web3forms.com/submit"
    method="POST"
    class="text-white"
>
    <input
        type="hidden"
        name="access_key"
        value="df9bcfeb-3c56-48fc-9ae4-50f746d31504"
    />
    <input
        type="hidden"
        name="subject"
        value="New Inquiry about {{page.title}}"
    />
    <input type="hidden" name="from_name" value="Rise Up {{page.title}} Form" />
    <input
        type="hidden"
        name="redirect"
        value="{{site.url}}/{{site.baseurl}}/thanks"
    />

    <div class="text-sm uppercase tracking-wider pb-4 text-red-500 italic">
        * indicates required
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label
                for="first_name"
                class="block text-sm uppercase tracking-widest mb-1"
                >First Name <span class="text-red-500">*</span></label
            >
            <input
                type="text"
                id="first_name"
                name="first_name"
                required
                class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white placeholder-gray-400 focus:outline-none"
            />
        </div>

        <div>
            <label
                for="last_name"
                class="block text-sm uppercase tracking-widest mb-1"
                >Last Name <span class="text-red-500">*</span></label
            >
            <input
                type="text"
                id="last_name"
                name="last_name"
                required
                class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white placeholder-gray-400 focus:outline-none"
            />
        </div>

        <div>
            <label
                for="email"
                class="block text-sm uppercase tracking-widest mb-1"
                >Email <span class="text-red-500">*</span></label
            >
            <input
                type="email"
                id="email"
                name="email"
                required
                class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white placeholder-gray-400 focus:outline-none"
            />
        </div>

        <div>
            <label
                for="phone_number"
                class="block text-sm uppercase tracking-widest mb-1"
                >Phone Number</label
            >
            <input
                type="tel"
                id="phone_number"
                name="phone_number"
                class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white placeholder-gray-400 focus:outline-none"
            />
        </div>

        <div>
            <label
                for="event_date"
                class="block text-sm uppercase tracking-widest mb-1"
                >Event Date</label
            >
            <input
                type="date"
                id="event_date"
                name="event_date"
                class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white focus:outline-none"
            />
        </div>

        <div>
            <label
                for="event_location"
                class="block text-sm uppercase tracking-widest mb-1"
                >Event Location</label
            >
            <input
                type="text"
                id="event_location"
                name="event_location"
                class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white placeholder-gray-400 focus:outline-none"
            />
        </div>

        <div>
            <label
                for="crowd_size"
                class="block text-sm uppercase tracking-widest mb-1"
                >Crowd Size</label
            >
            <input
                type="number"
                id="crowd_size"
                name="crowd_size"
                class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white placeholder-gray-400 focus:outline-none"
            />
        </div>

        <div>
            <label
                for="number_of_other_food_trucks_if_any"
                class="block text-sm uppercase tracking-widest mb-1"
                >Number of Other Food Trucks (if any)</label
            >
            <input
                type="number"
                id="number_of_other_food_trucks_if_any"
                name="number_of_other_food_trucks_if_any"
                class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white placeholder-gray-400 focus:outline-none"
            />
        </div>
    </div>

    <div class="mt-6">
        <label
            for="message"
            class="block text-sm uppercase tracking-widest mb-1"
            >Message <span class="text-red-500">*</span></label
        >
        <textarea
            id="message"
            name="message"
            required
            rows="4"
            class="w-full bg-transparent border-b-2 border-b-red-500 border-dashed px-1 py-2 text-white placeholder-gray-400 focus:outline-none resize-y"
        ></textarea>
    </div>

    <div class="h-captcha mt-6" data-captcha="true" data-theme="dark"></div>

    <button
        type="submit"
        class="w-full bg-red-600 hover:bg-red-700 text-white uppercase tracking-widest py-3 px-4 rounded border-2 border-red-500 border-dashed transition-colors duration-150 text-lg mt-6"
    >
        ➼ Send message
    </button>
</form>
